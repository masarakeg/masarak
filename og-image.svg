  <line x1="0" y1="315" x2="1200" y2="315" stroke="#7C3AED" stroke-width="0.6" stroke-dasharray="6,12" opacity="0.25"/>
  <line x1="0" y1="472" x2="1200" y2="472" stroke="#7C3AED" stroke-width="0.6" stroke-dasharray="6,12" opacity="0.25"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#7C3AED" stroke-width="0.6" stroke-dasharray="6,12" opacity="0.25"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#7C3AED" stroke-width="0.6" stroke-dasharray="6,12" opacity="0.25"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#7C3AED" stroke-width="0.6" stroke-dasharray="6,12" opacity="0.25"/>

  <!-- glows -->
  <ellipse cx="1050" cy="120" rx="280" ry="180" fill="#6025C5" opacity="0.22"/>
  <ellipse cx="160" cy="530" rx="240" ry="160" fill="#D4AF37" opacity="0.13"/>

