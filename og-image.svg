  <rect x="72" y="430" width="240" height="90" rx="14" fill="#111830" stroke="#7C3AED" stroke-width="1"/>
  <text x="192" y="468" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="34" font-weight="900" fill="#9B5DFF">+500</text>
  <text x="192" y="503" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="18" fill="#8892B0">عميل راضي</text>

  <rect x="340" y="430" width="240" height="90" rx="14" fill="#111830" stroke="#7C3AED" stroke-width="1"/>
  <text x="460" y="468" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="34" font-weight="900" fill="#D4AF37">95%</text>
  <text x="460" y="503" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="18" fill="#8892B0">نجاح ATS</text>

  <rect x="608" y="430" width="240" height="90" rx="14" fill="#111830" stroke="#D4AF37" stroke-width="1"/>
  <text x="728" y="468" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="34" font-weight="900" fill="#D4AF37">48h</text>
  <text x="728" y="503" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="18" fill="#8892B0">وقت التسليم</text>

  <rect x="876" y="430" width="240" height="90" rx="14" fill="#111830" stroke="#7C3AED" stroke-width="1"/>
  <text x="996" y="468" text-anchor="middle" font-family="Tajawal, Arial, sans-serif" font-size="34" font-weight="900" fill="#9B5DFF">4.9 ★</text>
